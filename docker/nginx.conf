server {
  listen 80;
  server_name _;
  index index.html;
  root /usr/share/nginx/html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://www.google.com https://maps.google.com; upgrade-insecure-requests" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

  if ($http_x_forwarded_proto != "https") {
    return 308 https://$host$request_uri;
  }

  # Static export routes are emitted as .html files, so /kontakt works
  # while /kontakt/ should canonicalize to the slashless variant.
  location ~ ^(.+)/$ {
    return 301 $scheme://$host$1$is_args$args;
  }

  location / {
    try_files $uri $uri.html $uri/index.html =404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
