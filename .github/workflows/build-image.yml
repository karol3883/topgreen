name: Build And Publish Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: karol3883/justcode

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=topgreen,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (and push on push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Mikrus deploy
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        env:
          MIKRUS_SRV: ${{ secrets.MIKRUS_SRV }}
          MIKRUS_KEY: ${{ secrets.MIKRUS_API_KEY }}
        run: |
          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "${response_file}" -w "%{http_code}" \
              --data-urlencode "srv=${MIKRUS_SRV}" \
              --data-urlencode "key=${MIKRUS_KEY}" \
              --data-urlencode "cmd=cd /opt/mikrus && bash ./run.sh topgreen" \
              https://api.mikr.us/exec
          )"

          cat "${response_file}"

          if [ "${http_code}" -ge 400 ]; then
            echo
            echo "Mikrus deploy failed with HTTP ${http_code}"
            exit 1
          fi
